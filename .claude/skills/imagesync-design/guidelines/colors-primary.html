<!-- @dsCard group="Colors" viewport="700x150" name="Primary pinks" subtitle="Raspberry accent + petal and mist surfaces" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 14px; background: #fff; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sw { border-radius: 16px; height: 92px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; }
.n { font-size: 13px; font-weight: 700; }
.v { font-size: 11px; font-weight: 500; opacity: 0.75; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--raspberry); color: #fff;"><span class="n">--raspberry</span><span class="v">#D9486E · primary / CTAs</span></div>
  <div class="sw" style="background: var(--petal); color: var(--ink);"><span class="n">--petal</span><span class="v">#F8D3DE · emphasis surface</span></div>
  <div class="sw" style="background: var(--mist); color: var(--ink);"><span class="n">--mist</span><span class="v">#FDF0F4 · card surface</span></div>
</div>
</body>
</html>
