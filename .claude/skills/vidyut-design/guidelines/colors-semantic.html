<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Error is the only semantic color — no success green, no warning yellow" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 14px; background: #fff; font-family: var(--font-sans); }
.row { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; align-items: stretch; }
.sw { border-radius: 16px; height: 92px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; background: var(--error); color: #fff; }
.n { font-size: 13px; font-weight: 700; }
.v { font-size: 11px; font-weight: 500; opacity: 0.75; }
.demo { background: var(--mist); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 8px; height: 92px; box-sizing: border-box; }
.demo .material-icons-outlined { color: var(--error); font-size: 18px; }
.demo span.t { color: var(--error); font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><span class="n">--error</span><span class="v">#B3283E · text + icon only</span></div>
  <div class="demo">
    <span class="material-icons-outlined">error_outline</span>
    <span class="t">QR code is not a valid Vidyut pairing code.</span>
  </div>
</div>
</body>
</html>
