<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="20 cards · 16 inputs · 14 icon chips · 13 tile icons · pill buttons" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans); color: var(--ink); }
.row { display: flex; gap: 16px; align-items: center; }
.item { display: grid; gap: 8px; justify-items: center; }
.box { width: 84px; height: 84px; background: var(--mist); border: 1.5px solid var(--petal); }
.l { font-size: 11px; font-weight: 600; color: var(--muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius: 20px;"></div><span class="l">20 · card</span></div>
  <div class="item"><div class="box" style="border-radius: 16px;"></div><span class="l">16 · input, tile</span></div>
  <div class="item"><div class="box" style="border-radius: 14px;"></div><span class="l">14 · icon chip</span></div>
  <div class="item"><div class="box" style="border-radius: 13px;"></div><span class="l">13 · tile icon</span></div>
  <div class="item"><div class="box" style="width: 160px; height: 54px; border-radius: 999px; background: var(--raspberry); border: none;"></div><span class="l">pill · buttons, chips, snackbar</span></div>
</div>
</body>
</html>
