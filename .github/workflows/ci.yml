name: CI

on:
  push:
  pull_request:

jobs:
  relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build relay binary
        run: bun run build:relay

      - name: Upload relay binary
        uses: actions/upload-artifact@v4
        with:
          name: imagesync-relay-linux-x64
          path: dist/imagesync-relay

  flutter-placeholder:
    name: Flutter app
    runs-on: ubuntu-latest
    if: ${{ hashFiles('app/pubspec.yaml') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

      - name: Build debug APK
        working-directory: app
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: imagesync-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
