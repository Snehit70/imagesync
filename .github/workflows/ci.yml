name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        # TS7 (7.0.2) is younger than Bun's 7-day release-age gate; drop this override once it ages past 2026-07-15.
        run: bun install --frozen-lockfile --minimum-release-age=0

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build relay binary
        run: bun run build:relay

      - name: Upload relay binary
        uses: actions/upload-artifact@v4
        with:
          name: vidyut-relay-linux-x64
          path: dist/vidyut-relay
          if-no-files-found: error

  app:
    name: Flutter app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

      - name: Build debug APK
        working-directory: app
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vidyut-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
