name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Bump version, build, and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'push' ||
      (
        github.actor != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release branch
        run: |
          set -euo pipefail
          git fetch origin main
          if [ "${{ github.event_name }}" = "push" ]; then
            EXPECTED_SHA="${{ github.sha }}"
          else
            EXPECTED_SHA="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse HEAD)" != "$EXPECTED_SHA" ]; then
            echo "Release workflow must run from the current origin/main commit" >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump || 'patch' }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi

          git log --format=%B "$RANGE" > /tmp/commit-messages.txt

          if grep -qE '(^[a-zA-Z]+(\([^)]+\))?!:|BREAKING CHANGE:)' /tmp/commit-messages.txt; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif grep -qE '^feat(\([^)]+\))?:' /tmp/commit-messages.txt; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif grep -qE '^(fix|perf)(\([^)]+\))?:' /tmp/commit-messages.txt; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PUBSPEC="app/pubspec.yaml"
          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          CURRENT_LINE="$(grep -E '^version: ' "$PUBSPEC")"
          CURRENT_NAME="$(echo "$CURRENT_LINE" | sed -E 's/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$/\1/')"
          CURRENT_BUILD="$(echo "$CURRENT_LINE" | sed -E 's/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$/\2/')"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unsupported bump type: $BUMP_TYPE" >&2
              exit 1
              ;;
          esac

          NEW_BUILD=$((CURRENT_BUILD + 1))
          NEW_NAME="$MAJOR.$MINOR.$PATCH"

          sed -i -E "s/^version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+\$/version: $NEW_NAME+$NEW_BUILD/" "$PUBSPEC"
          sed -i -E "s/\"version\": \"[^\"]+\"/\"version\": \"$NEW_NAME\"/" package.json

          CHANGED_FILES="$(git diff --name-only | sort)"
          EXPECTED_FILES="$(printf '%s\n' "$PUBSPEC" package.json | sort)"
          if [ "$CHANGED_FILES" != "$EXPECTED_FILES" ]; then
            echo "Unexpected changed files after version bump:" >&2
            git status --short >&2
            exit 1
          fi

          echo "new_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=vidyut-$NEW_NAME-debug.apk" >> "$GITHUB_OUTPUT"
          echo "relay_name=vidyut-relay-$NEW_NAME-linux-x64" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT_NAME+$CURRENT_BUILD -> $NEW_NAME+$NEW_BUILD"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Build relay binary
        run: |
          set -euo pipefail
          # TS7 (7.0.2) is younger than Bun's 7-day release-age gate; drop this override once it ages past 2026-07-15.
          bun install --frozen-lockfile --minimum-release-age=0
          bun run build:relay

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "DEBUG_KEYSTORE_BASE64 secret is not set; releases would be signed" \
                 "with an ephemeral key and break in-place updates." >&2
            exit 1
          fi
          mkdir -p "$HOME/.android"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/debug.keystore"

      - name: Install app dependencies
        working-directory: app
        run: flutter pub get

      - name: Build debug APK
        working-directory: app
        run: flutter build apk --debug

      - name: Commit and tag version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.new_name }}"
          TAG="${{ steps.version.outputs.tag }}"

          git add app/pubspec.yaml package.json
          git commit -m "chore(release): bump version to $VERSION"
          git tag -a "$TAG" -m "Release $TAG"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp app/build/app/outputs/flutter-apk/app-debug.apk \
             "release-artifacts/${{ steps.version.outputs.apk_name }}"
          cp dist/vidyut-relay "release-artifacts/${{ steps.version.outputs.relay_name }}"
          (cd release-artifacts && sha256sum "${{ steps.version.outputs.apk_name }}" > "${{ steps.version.outputs.apk_name }}.sha256")
          (cd release-artifacts && sha256sum "${{ steps.version.outputs.relay_name }}" > "${{ steps.version.outputs.relay_name }}.sha256")

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vidyut-${{ steps.version.outputs.new_name }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Push version commit and tag
        run: |
          set -euo pipefail
          git push --atomic origin HEAD:main "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vidyut ${{ steps.version.outputs.new_name }}
          generate_release_notes: true
          files: release-artifacts/*
