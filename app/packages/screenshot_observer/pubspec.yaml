name: screenshot_observer
description: >-
  App-local ImageSync plugin hosting a MediaStore ContentObserver from
  application context, so screenshot detection works in the headless
  foreground-service engine as well as the activity engine.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.snehit.imagesync.screenshot_observer
        pluginClass: ScreenshotObserverPlugin
