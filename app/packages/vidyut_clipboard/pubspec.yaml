name: vidyut_clipboard
description: >-
  App-local Vidyut plugin hosting the vidyut/clipboard channel from
  application context, so clipboard writes work in the headless
  foreground-service engine as well as the activity engine.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.snehit.vidyut.vidyut_clipboard
        pluginClass: VidyutClipboardPlugin
